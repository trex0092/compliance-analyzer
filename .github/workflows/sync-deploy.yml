name: Deploy

on:
  push:
    branches: [ main ]

jobs:
  # ALWAYS runs - free, unlimited, no credits
  sync-github-pages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Sync to gh-pages (GitHub Pages)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git push origin main:gh-pages --force
          echo "✅ GitHub Pages updated — https://trex0092.github.io/compliance-analyzer/"

  # Netlify auto-deploys when Netlify detects the push
  # netlify.toml ignores the build UNLESS commit message contains [release]
  # Normal pushes = 0 Netlify credits used
  # To release to Netlify: add [release] to your commit message
