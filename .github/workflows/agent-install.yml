name: Install Managed Agents

# Browser-only installer for the Hawkeye Managed Agents.
#
# Trigger from: GitHub → Actions → Install Managed Agents → Run workflow.
#
# Required secrets (Settings → Secrets and variables → Actions):
#   ANTHROPIC_API_KEY — console.anthropic.com → Settings → Keys
#
# Optional:
#   HAWKEYE_BRAIN_TOKEN — if set, the workflow reuses it. If unset,
#                         the workflow generates a fresh token and
#                         writes it to the `brain-token` artifact for
#                         the user to download.

on:
  workflow_dispatch:
    inputs:
      which:
        description: Which agent to install
        required: true
        default: both
        type: choice
        options:
          - both
          - incident-commander
          - hawkeye-mlro

permissions:
  contents: read

jobs:
  install:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve or generate brain token
        id: token
        run: |
          mkdir -p artifacts
          if [ -n "${{ secrets.HAWKEYE_BRAIN_TOKEN }}" ]; then
            echo "using existing HAWKEYE_BRAIN_TOKEN secret"
            echo "generated=false" >> "$GITHUB_OUTPUT"
            printf 'reused_existing_secret\n' > artifacts/brain-token.txt
          else
            NEW_TOKEN=$(openssl rand -hex 24)
            # IMPORTANT: we deliberately do NOT ::add-mask:: this token.
            # Masking would also scrub it from the artifact file contents
            # and the user would have no way to retrieve it. The token
            # lives only in the private artifact, not in the step log.
            printf 'HAWKEYE_BRAIN_TOKEN=%s\n' "$NEW_TOKEN" > artifacts/brain-token.txt
            echo "generated=true" >> "$GITHUB_OUTPUT"
            echo "generated a new token — see the brain-token artifact"
          fi

      - name: Install agent(s) (with log capture)
        id: install
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          # Capture stdout+stderr so failures are downloadable even when
          # the step log isn't accessible to the caller.
          mkdir -p artifacts
          LOG=artifacts/install.log
          set -o pipefail

          run() {
            echo "==> $*" | tee -a "$LOG"
            "$@" 2>&1 | tee -a "$LOG"
          }

          case "${{ inputs.which }}" in
            both)
              run node scripts/install-agent.mjs agents/incident-commander.yml
              run node scripts/install-agent.mjs agents/hawkeye-mlro.yml
              ;;
            incident-commander)
              run node scripts/install-agent.mjs agents/incident-commander.yml
              ;;
            hawkeye-mlro)
              run node scripts/install-agent.mjs agents/hawkeye-mlro.yml
              ;;
          esac

      - name: Stage .env.agents for artifact
        if: always()
        run: |
          mkdir -p artifacts
          # Stage as env-agents.txt (NO dot prefix) so:
          # (a) actions/upload-artifact@v4 doesn't silently skip it
          #     (hidden files are excluded by default)
          # (b) Windows Explorer shows it to the user
          if [ -f .env.agents ]; then
            cp .env.agents artifacts/env-agents.txt
          else
            echo "# install-agent.mjs did not produce .env.agents — see install.log" \
              > artifacts/env-agents.txt
          fi

      - name: Upload install artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hawkeye-install
          path: artifacts/
          retention-days: 30
          if-no-files-found: warn
          include-hidden-files: true

      - name: Write step summary
        if: always()
        run: |
          {
            echo "# Hawkeye Managed Agent install"
            echo
            echo "**Which:** \`${{ inputs.which }}\`"
            echo "**Install step outcome:** \`${{ steps.install.outcome }}\`"
            echo
            echo "## Where to find your values"
            echo
            echo "Scroll to the top of this run page and download the"
            echo "**\`hawkeye-install\`** artifact (next to the run title)."
            echo "It contains three files:"
            echo
            echo "| File | Contents |"
            echo "|---|---|"
            echo "| \`brain-token.txt\` | Your \`HAWKEYE_BRAIN_TOKEN\` (fresh or reused) |"
            echo "| \`.env.agents\` | Agent IDs and versions |"
            echo "| \`install.log\` | Full install-agent.mjs stdout+stderr |"
            echo
            if [ "${{ steps.install.outcome }}" = "failure" ]; then
              echo "## :x: Install failed"
              echo
              if [ -f artifacts/install.log ]; then
                echo "### install.log (inline)"
                echo
                echo '```'
                cat artifacts/install.log
                echo '```'
                echo
              fi
              echo "Common causes:"
              echo "- Account lacks Managed Agents beta access (contact Anthropic support)"
              echo "- \`ANTHROPIC_API_KEY\` secret is wrong or expired"
              echo "- Agent name conflicts with an existing agent in a different state"
              echo
              echo "Full log is also in the \`hawkeye-install\` artifact above."
            else
              echo "## :white_check_mark: Install succeeded"
              echo
              if [ "${{ steps.token.outputs.generated }}" = "true" ]; then
                echo "### Save your new brain token"
                echo
                echo "Download the artifact above and open \`brain-token.txt\`."
                echo "Paste the \`HAWKEYE_BRAIN_TOKEN\` value into **both**:"
                echo
                echo "1. **GitHub** → Settings → Secrets and variables → Actions →"
                echo "   New repository secret. Name: \`HAWKEYE_BRAIN_TOKEN\`."
                echo
                echo "2. **Netlify** → site settings → Environment variables →"
                echo "   Add variable. Key: \`HAWKEYE_BRAIN_TOKEN\`. Then"
                echo "   **Trigger deploy** so \`/api/brain\` picks up the new value."
              else
                echo "Your existing \`HAWKEYE_BRAIN_TOKEN\` secret was reused."
                echo "Make sure the SAME value is also set in Netlify site env vars."
              fi
              echo
              echo "### Run a session"
              echo
              echo "Once the token is in both places, trigger the"
              echo "**Run Managed Agent** workflow from the Actions tab."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
