name: Regulatory Watcher — Daily

# Fetches known UAE AML/CFT/CPF regulatory sources, hashes them, and
# fires a brain event when any of them change. On change, the MLRO
# agent's 30-day policy update clock starts (FDL Art.34 / MoE 08/2021).
#
# State (data/regulatory-hashes.json) is persisted across runs via
# actions/cache — no git push, no branch protection conflict.

on:
  schedule:
    - cron: '30 5 * * *'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual run'
        required: false
        default: 'Manual trigger'

permissions:
  contents: read

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Restore regulatory-hashes state
        uses: actions/cache@v4
        with:
          path: data/regulatory-hashes.json
          key: regulatory-hashes-${{ github.run_number }}
          restore-keys: |
            regulatory-hashes-

      - name: Run regulatory watcher
        env:
          HAWKEYE_BRAIN_URL: ${{ secrets.HAWKEYE_BRAIN_URL || 'https://compliance-analyzer.netlify.app' }}
          HAWKEYE_BRAIN_TOKEN: ${{ secrets.HAWKEYE_BRAIN_TOKEN }}
        run: |
          mkdir -p artifacts data
          set -o pipefail
          npm run regulatory:watch 2>&1 | tee artifacts/regulatory-watcher.log
          # Copy state into the artifact bundle so it's downloadable for
          # debugging — the primary persistence is the actions/cache
          # store, but the artifact is a belt-and-suspenders backup.
          if [ -f data/regulatory-hashes.json ]; then
            cp data/regulatory-hashes.json artifacts/regulatory-hashes.json
          fi

      - name: Upload watcher artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regulatory-watcher-${{ github.run_number }}
          path: artifacts/
          retention-days: 90
          include-hidden-files: true

      - name: Write step summary
        if: always()
        run: |
          {
            echo "# Regulatory Watcher"
            echo
            if [ -f artifacts/regulatory-watcher.log ]; then
              echo '```'
              tail -n 60 artifacts/regulatory-watcher.log
              echo '```'
            else
              echo "_no log produced_"
            fi
            echo
            echo "Full log: \`regulatory-watcher-${{ github.run_number }}\` artifact."
          } >> "$GITHUB_STEP_SUMMARY"
