name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Node 18 reached End-of-Life on 2025-04-30 (nodejs.org release
        # schedule). Testing against an EOL runtime gates merges on a
        # platform we no longer ship to. Production runs on Node 20+
        # via the Netlify default; CI mirrors that single supported
        # version. Re-add Node 22 here once it's been promoted to
        # Active LTS in our deployment environment.
        node-version: [20]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Cache ESLint + Vitest
        uses: actions/cache@v4
        with:
          path: |
            .eslintcache
            node_modules/.vitest
            node_modules/.cache
          key: ${{ runner.os }}-node${{ matrix.node-version }}-tools-${{ hashFiles('package-lock.json', '.eslintrc.json', 'vitest.config.ts') }}
          restore-keys: |
            ${{ runner.os }}-node${{ matrix.node-version }}-tools-

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies for vulnerabilities
        run: npm audit --audit-level=high || true

      - name: Lint TypeScript
        run: npm run lint:ts

      - name: Type-check TypeScript
        # Catches shape-drift errors that eslint doesn't — running
        # tsc --noEmit here means an incorrect import signature can
        # no longer slip through to main as happened with
        # complianceDecisionEngine.ts in #105.
        run: npx tsc --noEmit

      - name: Run tests
        run: npm test

      - name: Validate goAML fixtures (STR/SAR/CTR/DPMSR/CNMR)
        run: npm run validate:goaml -- --all

      - name: Check formatting
        run: npm run format:check
