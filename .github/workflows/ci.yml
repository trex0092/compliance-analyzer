name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Cache ESLint + Vitest
        uses: actions/cache@v4
        with:
          path: |
            .eslintcache
            node_modules/.vitest
            node_modules/.cache
          key: ${{ runner.os }}-node${{ matrix.node-version }}-tools-${{ hashFiles('package-lock.json', '.eslintrc.json', 'vitest.config.ts') }}
          restore-keys: |
            ${{ runner.os }}-node${{ matrix.node-version }}-tools-

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies for vulnerabilities
        run: npm audit --audit-level=high || true

      - name: Lint TypeScript
        run: npm run lint:ts

      - name: Run tests
        run: npm test

      - name: Check formatting
        run: npm run format:check
