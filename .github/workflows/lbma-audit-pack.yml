name: LBMA Audit Pack — Weekly

# Generates the LBMA RGG v9 audit pack from the MoE inspection
# simulator. Uploads the pack as a 365-day artifact — no commit back
# to main (branch protection friendly).
#
# Schedule: every Monday at 07:00 UTC (11:00 UAE).

on:
  schedule:
    - cron: '0 7 * * 1'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual run'
        required: false
        default: 'Manual trigger'

permissions:
  contents: read

jobs:
  audit-pack:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate LBMA audit pack
        env:
          HAWKEYE_BRAIN_URL: ${{ secrets.HAWKEYE_BRAIN_URL || 'https://compliance-analyzer.netlify.app' }}
          HAWKEYE_BRAIN_TOKEN: ${{ secrets.HAWKEYE_BRAIN_TOKEN }}
        run: |
          mkdir -p history/lbma
          npm run audit:lbma

      - name: Upload pack as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lbma-audit-pack-${{ github.run_number }}
          path: history/lbma/
          retention-days: 365
          if-no-files-found: warn

      - name: Write step summary
        if: always()
        run: |
          {
            echo "# LBMA Audit Pack — weekly"
            echo
            LATEST_MD=$(ls -t history/lbma/*.md 2>/dev/null | head -n1 || true)
            if [ -n "$LATEST_MD" ]; then
              echo "Latest pack: \`${LATEST_MD}\`"
              echo
              echo "<details><summary>Preview (first 80 lines)</summary>"
              echo
              echo '```markdown'
              head -n 80 "$LATEST_MD"
              echo '```'
              echo
              echo '</details>'
            else
              echo "_no pack produced — see job log_"
            fi
            echo
            echo "Full artifact: \`lbma-audit-pack-${{ github.run_number }}\` (365-day retention)"
          } >> "$GITHUB_STEP_SUMMARY"
