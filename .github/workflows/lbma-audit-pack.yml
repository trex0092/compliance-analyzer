name: LBMA Audit Pack — Weekly

# Runs the MoE inspection simulator and reformats the output into the
# LBMA Responsible Gold Guidance v9 five-step framework. Commits the
# generated audit pack (markdown + JSON) into history/lbma/ so the
# pack is versioned alongside the rest of the evidence chain.
#
# Schedule: every Monday at 07:00 UTC (11:00 UAE).
# Rationale: Monday morning kick-off for the weekly compliance stand-up
# with a fresh pack generated before the MLRO arrives.

on:
  schedule:
    - cron: '0 7 * * 1'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual run'
        required: false
        default: 'Manual trigger'

permissions:
  contents: write

jobs:
  audit-pack:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate LBMA audit pack
        env:
          # When the brain URL + token are set, the script's evidence-chain
          # append may also trigger a brain event for traceability.
          HAWKEYE_BRAIN_URL: ${{ secrets.HAWKEYE_BRAIN_URL || 'https://compliance-analyzer.netlify.app' }}
          HAWKEYE_BRAIN_TOKEN: ${{ secrets.HAWKEYE_BRAIN_TOKEN }}
        run: npm run audit:lbma

      - name: Commit generated pack
        if: always()
        run: |
          if [ -d history/lbma ] && [ "$(ls -A history/lbma 2>/dev/null)" ]; then
            git config user.name 'hawkeye-lbma-bot[bot]'
            git config user.email 'hawkeye-lbma-bot[bot]@users.noreply.github.com'
            git add history/lbma/
            if git diff --cached --quiet; then
              echo "no new pack to commit"
            else
              git commit -m "chore(lbma): weekly audit pack

Generated by lbma-audit-pack.yml. Maps the 25-item MoE inspection
checklist to the LBMA Responsible Gold Guidance v9 five-step
framework. The pack is advisory — a full audit still requires an
independent reviewer per LBMA RGG v9 Step 4."
              git push origin main
            fi
          fi

      - name: Upload pack as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lbma-audit-pack-${{ github.run_number }}
          path: history/lbma/
          retention-days: 365

      - name: Write step summary
        if: always()
        run: |
          {
            echo "# LBMA Audit Pack — weekly"
            echo
            LATEST_MD=$(ls -t history/lbma/*.md 2>/dev/null | head -n1 || true)
            if [ -n "$LATEST_MD" ]; then
              echo "Latest pack: \`${LATEST_MD}\`"
              echo
              echo "<details><summary>Preview</summary>"
              echo
              echo '```markdown'
              head -n 80 "$LATEST_MD"
              echo '```'
              echo
              echo '</details>'
            fi
            echo
            echo "Full artifact: \`lbma-audit-pack-${{ github.run_number }}\` (365-day retention)"
          } >> "$GITHUB_STEP_SUMMARY"
