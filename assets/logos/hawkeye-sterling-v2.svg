<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8D48B;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#C9A84C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B6914;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#111111;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0A0A0A;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="64" fill="url(#bgGrad)"/>

  <!-- Subtle radial glow behind eye -->
  <circle cx="256" cy="230" r="140" fill="#C9A84C" opacity="0.03"/>
  <circle cx="256" cy="230" r="90" fill="#C9A84C" opacity="0.04"/>

  <!-- Outer decorative ring -->
  <circle cx="256" cy="220" r="120" stroke="#C9A84C" stroke-width="0.5" fill="none" opacity="0.15"/>

  <!-- The Eye - Outer circle -->
  <circle cx="256" cy="220" r="80" stroke="url(#goldGrad)" stroke-width="2.5" fill="none" filter="url(#glow)"/>

  <!-- The Eye - Inner circle -->
  <circle cx="256" cy="220" r="42" stroke="#C9A84C" stroke-width="1.2" fill="none" opacity="0.5"/>

  <!-- The Eye - Iris glow -->
  <circle cx="256" cy="220" r="22" fill="#C9A84C" opacity="0.15"/>

  <!-- The Eye - Pupil -->
  <circle cx="256" cy="220" r="12" fill="url(#goldGrad)" filter="url(#softGlow)"/>

  <!-- The Eye - Lower arc (hawk beak/talon shape) -->
  <path d="M148 280 Q256 380 364 280" stroke="url(#goldGrad)" stroke-width="2.5" fill="none" filter="url(#glow)"/>

  <!-- The Eye - Outer lower arc -->
  <path d="M128 268 Q256 400 384 268" stroke="#C9A84C" stroke-width="1" fill="none" opacity="0.25"/>

  <!-- Crown rays (hawk feathers / precision lines) -->
  <line x1="256" y1="140" x2="256" y2="110" stroke="#C9A84C" stroke-width="1.2" opacity="0.4"/>
  <line x1="210" y1="155" x2="195" y2="130" stroke="#C9A84C" stroke-width="1" opacity="0.3"/>
  <line x1="302" y1="155" x2="317" y2="130" stroke="#C9A84C" stroke-width="1" opacity="0.3"/>
  <line x1="175" y1="185" x2="155" y2="168" stroke="#C9A84C" stroke-width="0.8" opacity="0.2"/>
  <line x1="337" y1="185" x2="357" y2="168" stroke="#C9A84C" stroke-width="0.8" opacity="0.2"/>

  <!-- Decorative divider line -->
  <line x1="176" y1="380" x2="336" y2="380" stroke="url(#goldGrad)" stroke-width="1" opacity="0.4"/>

  <!-- Text: HAWKEYE -->
  <text x="256" y="420" text-anchor="middle" font-family="serif" font-size="36" font-weight="400" letter-spacing="12" fill="#C9A84C" opacity="0.9">HAWKEYE</text>

  <!-- Text: STERLING -->
  <text x="256" y="455" text-anchor="middle" font-family="serif" font-size="24" font-weight="300" letter-spacing="16" fill="#C9A84C" opacity="0.6">STERLING</text>

  <!-- Text: V2 -->
  <text x="256" y="480" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="400" letter-spacing="8" fill="#8B6914" opacity="0.5">V 2</text>
</svg>
