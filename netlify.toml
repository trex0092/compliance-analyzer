[build]
  publish = "."
  command = "echo deploy-v3.0-enhancements"

[build.environment]
  # Exclude vendored third-party reference code from secrets scanning.
  # The vendor/ tree contains read-only upstream projects (Airflow, etc.)
  # whose test fixtures and docs include placeholder tokens like "xoxb-***"
  # that trigger false positives. None of this code is served by the site.
  SECRETS_SCAN_OMIT_PATHS = "vendor/**,docs/**,graphify-out/**,.agents/**,**/*.md,**/*.rst"

[functions]
  directory = "netlify/functions"

[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    # X-XSS-Protection removed: legacy header, deprecated, ignored by
    # modern browsers, and can actively conflict with a strong CSP.
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Cross-Origin-Opener-Policy = "same-origin"
    Cross-Origin-Resource-Policy = "same-origin"
    # Tightened CSP (audit §H-2):
    #  - Removed 'unsafe-hashes', cdnjs, jsdelivr — reduces CDN supply-
    #    chain RCE surface. Inline scripts now require self-hosted
    #    bundles; the two inline sha256 hashes are kept for the
    #    strict-allow inline snippet.
    #  - Removed https://api.allorigins.win (public CORS proxy, known
    #    exfiltration vector).
    #  - Removed https://*.netlify.app wildcard from connect-src.
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'sha256-czf1SrR0FvvulXLO94AEDNFMUsrhJwZFAOM0j6jbAlM=' 'sha256-wpop8Hj4EY+jhKI5x9CFuAe11w4VD8ZwfcHpZi6SI1c='; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' https://app.asana.com https://api.anthropic.com https://api.openai.com https://www.googleapis.com https://accounts.google.com https://generativelanguage.googleapis.com https://api.tavily.com https://api.metals.live https://api.gold-api.com https://api.metalpriceapi.com https://open.er-api.com https://data-asg.goldprice.org https://fonts.googleapis.com https://fonts.gstatic.com https://openrouter.ai https://scsanctions.un.org https://sanctionslistservice.ofac.treas.gov https://webgate.ec.europa.eu https://ofsistorage.blob.core.windows.net; base-uri 'self'; form-action 'self'; object-src 'none'; frame-ancestors 'none'; upgrade-insecure-requests"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Content-Type = "application/javascript"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Content-Type = "application/manifest+json"
