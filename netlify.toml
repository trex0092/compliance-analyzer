[build]
  publish = "."
  command = "echo deploy-v3.0-enhancements"
  # Deploy-preview deduplication.
  #
  # This repo is linked to two Netlify sites:
  #   1. "compliance-analyzer"  — legacy site, still the production
  #      brain backend referenced by .github/workflows/*.yml
  #      (autopilot, agent-run, regulatory-watcher, scheduled-screening,
  #      lbma-audit-pack) via https://compliance-analyzer.netlify.app
  #   2. "hawkeye-sterling-v2"  — current site, the canonical UI target
  #
  # Before this rule, every PR posted two deploy-preview comments
  # (one per site) which was noisy. We cannot unlink the legacy site
  # without breaking the GitHub workflows that hit its production URL,
  # so we keep the site linked but suppress only its deploy-preview
  # builds. Production (CONTEXT=production) and branch deploys
  # (CONTEXT=branch-deploy) on either site are unaffected.
  #
  # Netlify ignore command: exit 0 = cancel the build, exit 1 = proceed.
  # Both SITE_NAME and CONTEXT are read-only env vars injected by
  # Netlify (see https://docs.netlify.com/configure-builds/environment-variables/).
  ignore = "if [ \"$CONTEXT\" = \"deploy-preview\" ] && [ \"$SITE_NAME\" = \"compliance-analyzer\" ]; then echo 'skipping duplicate deploy-preview on legacy compliance-analyzer site'; exit 0; else exit 1; fi"

[build.environment]
  # Exclude vendored third-party reference code from secrets scanning.
  # The vendor/ tree contains read-only upstream projects (Airflow, etc.)
  # whose test fixtures and docs include placeholder tokens like "xoxb-***"
  # that trigger false positives. None of this code is served by the site.
  SECRETS_SCAN_OMIT_PATHS = "vendor/**,docs/**,graphify-out/**,.agents/**,**/*.md,**/*.rst"

[functions]
  directory = "netlify/functions"

[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    # X-XSS-Protection removed: legacy header, deprecated, ignored by
    # modern browsers, and can actively conflict with a strong CSP.
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Cross-Origin-Opener-Policy = "same-origin"
    Cross-Origin-Resource-Policy = "same-origin"
    # CSP — audit §H-2 hardened, with the two legitimate vendor CDNs
    # restored after the analytics tab broke when Chart.js + jsPDF +
    # JSZip + EmailJS could not load.
    #
    # Restored:
    #  - https://cdn.jsdelivr.net (Chart.js, JSZip, EmailJS) — pinned
    #    versions used by index.html. Future hardening: bundle these
    #    into assets/vendor/ and drop the CDN entirely. SRI integrity
    #    hashes should be added to the script tags as a follow-up.
    #  - https://cdnjs.cloudflare.com (jsPDF) — same rationale.
    #
    # Still removed (the worst offenders from audit §H-2):
    #  - 'unsafe-hashes' — wide XSS surface
    #  - https://api.allorigins.win (public CORS proxy, exfiltration vector)
    #  - https://*.netlify.app wildcard from connect-src
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'sha256-czf1SrR0FvvulXLO94AEDNFMUsrhJwZFAOM0j6jbAlM=' 'sha256-wpop8Hj4EY+jhKI5x9CFuAe11w4VD8ZwfcHpZi6SI1c=' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' https://app.asana.com https://api.anthropic.com https://api.openai.com https://www.googleapis.com https://accounts.google.com https://generativelanguage.googleapis.com https://api.tavily.com https://api.metals.live https://api.gold-api.com https://api.metalpriceapi.com https://open.er-api.com https://data-asg.goldprice.org https://fonts.googleapis.com https://fonts.gstatic.com https://openrouter.ai https://scsanctions.un.org https://sanctionslistservice.ofac.treas.gov https://webgate.ec.europa.eu https://ofsistorage.blob.core.windows.net; base-uri 'self'; form-action 'self'; object-src 'none'; frame-ancestors 'none'; upgrade-insecure-requests"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Content-Type = "application/javascript"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Content-Type = "application/manifest+json"
