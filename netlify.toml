[build]
  publish = "."
  command = "echo deploy-v3.0-enhancements"
  # Full decommission of both legacy Netlify sites.
  #
  # Canonical site: "hawkeye-sterling-v2" (hawkeye-sterling-v2.netlify.app).
  # The legacy "compliance-analyzer" and "hawkeye-sterling" sites are no
  # longer in use (both already "Auto Publishing Locked" in the Netlify
  # dashboard) — every context (deploy-preview, production, branch-
  # deploy) is cancelled here so an accidental dashboard re-enable
  # cannot publish stale code.
  #
  # Once both legacy sites are fully deleted in the Netlify dashboard,
  # this rule becomes a no-op and can be removed in a follow-up.
  #
  # Netlify ignore command: exit 0 = cancel the build, exit 1 = proceed.
  # SITE_NAME is a read-only env var injected by Netlify (see
  # https://docs.netlify.com/configure-builds/environment-variables/).
  ignore = "case \"$SITE_NAME\" in compliance-analyzer|hawkeye-sterling) echo \"$SITE_NAME is decommissioned; canonical site is hawkeye-sterling-v2\"; exit 0 ;; *) exit 1 ;; esac"

[build.environment]
  # Exclude vendored third-party reference code from secrets scanning.
  # The vendor/ tree contains read-only upstream projects (Airflow, etc.)
  # whose test fixtures and docs include placeholder tokens like "xoxb-***"
  # that trigger false positives. None of this code is served by the site.
  SECRETS_SCAN_OMIT_PATHS = "vendor/**,docs/**,graphify-out/**,.agents/**,**/*.md,**/*.rst,setup-qrcode.js"

[functions]
  directory = "netlify/functions"

# Preserve the stable `/api/continuous-monitor` URL now that the
# scheduled function can no longer declare a custom `path` (Netlify
# forbids combining `path:` + `schedule:` — see
# https://ntl.fyi/custom-path-scheduled-functions). Existing MLRO
# war-room callers and CI smoke tests keep working via this redirect.
[[redirects]]
  from = "/api/continuous-monitor"
  to = "/.netlify/functions/continuous-monitor"
  status = 200
  force = true

# Scheduled routine functions — Netlify forbids combining config.path
# with config.schedule (ntl.fyi/custom-path-scheduled-functions). All
# 33 `*-cron.mts` functions under netlify/functions therefore drop
# their `path:` declaration and live at their default URL. This glob
# preserves the stable `/api/routines/<slug>` surface used by
# routines.html dry-run buttons and CI smoke tests by rewriting to
# the default function URL (`<slug>-cron`). Regulatory basis: FDL
# No.(10)/2025 Art.20-21 (CO visibility), Art.24 (10-year audit).
[[redirects]]
  from = "/api/routines/*"
  to = "/.netlify/functions/:splat-cron"
  status = 200
  force = true

# Unified Asana task-creation endpoint used by /workbench, /logistics,
# /compliance-ops and /routines to create tasks in their dedicated
# Asana project. The backend routes by { source } and reads the target
# project GID from ASANA_{WORKBENCH,LOGISTICS,CENTRAL_MLRO,ROUTINES}_PROJECT_GID.
# Regulatory basis: FDL No.(10)/2025 Art.20-21, Art.24.
[[redirects]]
  from = "/api/asana/task"
  to = "/.netlify/functions/asana-task-create"
  status = 200
  force = true

# MLRO sign-in JWT endpoint. The function itself declares
# `config.path = "/api/hawkeye-login"` in auth-login.mts, but on some
# Netlify deploys the config.path registration does not surface the
# route (observed 404 from prod on 2026-04-20). This explicit redirect
# is the belt-and-braces that guarantees /api/hawkeye-login reaches
# the handler regardless of the config.path wiring.
# Regulatory basis: FDL No.(10)/2025 Art.20-21, Art.24.
[[redirects]]
  from = "/api/hawkeye-login"
  to = "/.netlify/functions/auth-login"
  status = 200
  force = true

# Read-only project-GID lookup per MLRO surface, used by pages to render
# "View in Asana" links without hardcoding GIDs.
[[redirects]]
  from = "/api/asana/config"
  to = "/.netlify/functions/asana-config"
  status = 200
  force = true

# Deep Reasoning — advisor-assisted MLRO analysis. Browser-facing
# entrypoint to the Worker+Advisor pattern documented in CLAUDE.md §1.
# The function authenticates (JWT or hex bearer), rate-limits 10/min
# per IP, and forwards the question through buildAdvisorRequest +
# parseAdvisorResponse from src/services/advisorStrategy.
# Regulatory basis: FDL No.(10)/2025 Art.20-21 (CO reasoning trail),
# Art.24 (10-year audit retention).
[[redirects]]
  from = "/api/brain-reason"
  to = "/.netlify/functions/brain-reason"
  status = 200
  force = true

# Main-page surface deep links. /integrations and /trading serve the
# root index.html body while keeping the clean URL in the address bar;
# app-boot.js reads location.pathname on load and activates the matching
# tab (tab-integrations or tab-metalstrading) + scrolls it into view.
# This gives the two Operations Surface cards on the main page
# (Integrations / Trading) their own shareable deep links instead of
# silently switching a tab that was already active on first paint.
# Regulatory basis: FDL No.10/2025 Art.20 (CO-duty traceability) &
# Art.24 (10-year audit trail — every surface entry is a distinct URL
# the audit log can reference).
[[redirects]]
  from = "/integrations"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/trading"
  to = "/index.html"
  status = 200

# Clean-URL rewrites for landing pages (belt-and-suspenders so the URLs
# work even if the site's Pretty URLs asset-optimization setting is off
# or temporarily flaky). Status 200 rewrites serve the .html body while
# keeping the clean URL in the address bar.
[[redirects]]
  from = "/workbench"
  to = "/workbench.html"
  status = 200

[[redirects]]
  from = "/logistics"
  to = "/logistics.html"
  status = 200

[[redirects]]
  from = "/routines"
  to = "/routines.html"
  status = 200

[[redirects]]
  from = "/compliance-ops"
  to = "/compliance-ops.html"
  status = 200

[[redirects]]
  from = "/screening-command"
  to = "/screening-command.html"
  status = 200

# Sub-path deep links. Every module inside a landing page is a
# client-side view (history.pushState in landing-module-viewer.js, or
# the inline filter handler in routines.html); Netlify serves the
# landing .html for any /<page>/<slug> path so a refresh, share, or
# direct open resolves correctly. The splat is discarded server-side —
# the client JS reads location.pathname on load and auto-opens the
# matching module or selects the matching filter chip.
[[redirects]]
  from = "/workbench/*"
  to = "/workbench.html"
  status = 200

[[redirects]]
  from = "/logistics/*"
  to = "/logistics.html"
  status = 200

[[redirects]]
  from = "/routines/*"
  to = "/routines.html"
  status = 200

[[redirects]]
  from = "/compliance-ops/*"
  to = "/compliance-ops.html"
  status = 200

[[redirects]]
  from = "/screening-command/*"
  to = "/screening-command.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    # X-XSS-Protection removed: legacy header, deprecated, ignored by
    # modern browsers, and can actively conflict with a strong CSP.
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Cross-Origin-Opener-Policy = "same-origin"
    Cross-Origin-Resource-Policy = "same-origin"
    # CSP — audit §H-2 hardened, with the two legitimate vendor CDNs
    # restored after the analytics tab broke when Chart.js + jsPDF +
    # JSZip + EmailJS could not load.
    #
    # Restored:
    #  - https://cdn.jsdelivr.net (Chart.js, JSZip, EmailJS) — pinned
    #    versions used by index.html. Future hardening: bundle these
    #    into assets/vendor/ and drop the CDN entirely. SRI integrity
    #    hashes should be added to the script tags as a follow-up.
    #  - https://cdnjs.cloudflare.com (jsPDF) — same rationale.
    #
    # Still removed (the worst offenders from audit §H-2):
    #  - 'unsafe-hashes' — wide XSS surface
    #  - https://api.allorigins.win (public CORS proxy, exfiltration vector)
    #  - https://*.netlify.app wildcard from connect-src
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'sha256-OSWPuki9+EuOD7XLKGau/7T5AgGcGvMOTEuGZtFdtHk=' 'sha256-dCmTh5g4qHzNrdfIR9qFg3IQkXDbF/PtiQuhOmNl2pw=' 'sha256-ydWyeD/OelaBxTq4zt/zCdPTgkkEEfIE1FYStuldH/8=' 'sha256-IBNXHJGgfMO2NGIuVMxr9klispo6th01CY0GjiGdFJ0=' 'sha256-hrVboLa3Hm2HY+WFuED5clonim4uZU2IQsv02Y2vgts=' 'sha256-Hk8jWk/pAJQwPmgIRyBAnq432tLgoV0B2S/KuTnYnjc=' 'sha256-BI1lyQZy1TrgaKgNr3quK/N+j4c7oz7jC1qm4ERO51Q=' 'sha256-K4iI5ntEav6k5Vwwc9YkoN1XlHGHipkOvU6z3oLlEtU=' 'sha256-x9p73TH/yMY3S8NTr1M+GfuUiPDgcjRPq1iOXCVUswM=' 'sha256-Lw3Hck/T4BTmfhfWpSdYxj3iqriReUGnY61i/M62imw=' 'sha256-uiMLoQ3hAM+oZOLo/EAeaqSjiXIncM1dwpgyEGcJwBA=' 'sha256-+pk6OfI/XT36Dz4GvPjEds5uQNnZwR6XX3I78smBllQ=' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' https://app.asana.com https://api.anthropic.com https://api.openai.com https://www.googleapis.com https://accounts.google.com https://generativelanguage.googleapis.com https://api.tavily.com https://api.metals.live https://api.gold-api.com https://api.metalpriceapi.com https://open.er-api.com https://data-asg.goldprice.org https://fonts.googleapis.com https://fonts.gstatic.com https://openrouter.ai https://scsanctions.un.org https://sanctionslistservice.ofac.treas.gov https://webgate.ec.europa.eu https://ofsistorage.blob.core.windows.net; base-uri 'self'; form-action 'self'; object-src 'none'; frame-ancestors 'self'; upgrade-insecure-requests"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Content-Type = "application/javascript"

# Cache strategy split ----------------------------------------------
# The /* block above paints everything no-store. That prevents stale
# HTML but also kills JS/CSS caching, so the browser re-downloads the
# whole SPA every visit. Below we override for versioned JS/CSS —
# anything matching *.js / *.css can cache for a year because our
# `?v=N` query-string changes on every deploy (manual bumps in HTML
# source).  HTML stays no-store from /* above, so the browser always
# fetches fresh and picks up whatever `?v=` the server currently
# serves. This is the standard "cache forever, bust with URL change"
# pattern and fixes the "old cached JS" class of issues after deploy.
[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Content-Type = "application/manifest+json"

# CORS for all API endpoints — ensures browser-based calls from the
# SPA (index.html, setup.html) can reach every Netlify function.
# Individual functions that set their own Access-Control-Allow-Origin
# will override this default (Netlify: function headers > toml headers).
[[headers]]
  for = "/api/*"
  [headers.values]
    Access-Control-Allow-Origin = "https://hawkeye-sterling-v2.netlify.app"
    Access-Control-Allow-Methods = "GET, POST, OPTIONS"
    Access-Control-Allow-Headers = "Authorization, Content-Type"
    Access-Control-Max-Age = "600"
    Vary = "Origin"

[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin = "https://hawkeye-sterling-v2.netlify.app"
    Access-Control-Allow-Methods = "GET, POST, OPTIONS"
    Access-Control-Allow-Headers = "Authorization, Content-Type"
    Access-Control-Max-Age = "600"
    Vary = "Origin"
