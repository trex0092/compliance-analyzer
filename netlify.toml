[build]
  publish = "."
  command = "echo deploy-v3.0-enhancements"
  # Deploy-preview deduplication (belt-and-braces safety net).
  #
  # Canonical site: "hawkeye-sterling-v2" (hawkeye-sterling-v2.netlify.app).
  # All code, workflows, docs, and env var defaults have been migrated to
  # this site. The legacy "compliance-analyzer" and "hawkeye-sterling"
  # Netlify sites are expected to be blocked ("Stop builds") in the
  # Netlify dashboard after merge.
  #
  # This ignore rule is a second line of defense: if someone ever
  # re-enables builds on the legacy "compliance-analyzer" site in the
  # dashboard by mistake, it will still skip deploy-preview builds so
  # PRs only post one preview comment. Production (CONTEXT=production)
  # and branch deploys (CONTEXT=branch-deploy) are unaffected — they
  # pass through and build normally, which is what you want while the
  # legacy site is being decommissioned.
  #
  # Once the legacy site is fully deleted in the Netlify dashboard,
  # this rule becomes a no-op and can be removed in a follow-up.
  #
  # Netlify ignore command: exit 0 = cancel the build, exit 1 = proceed.
  # Both SITE_NAME and CONTEXT are read-only env vars injected by
  # Netlify (see https://docs.netlify.com/configure-builds/environment-variables/).
  ignore = "if [ \"$CONTEXT\" = \"deploy-preview\" ] && [ \"$SITE_NAME\" = \"compliance-analyzer\" ]; then echo 'skipping duplicate deploy-preview on legacy compliance-analyzer site'; exit 0; else exit 1; fi"

[build.environment]
  # Exclude vendored third-party reference code from secrets scanning.
  # The vendor/ tree contains read-only upstream projects (Airflow, etc.)
  # whose test fixtures and docs include placeholder tokens like "xoxb-***"
  # that trigger false positives. None of this code is served by the site.
  SECRETS_SCAN_OMIT_PATHS = "vendor/**,docs/**,graphify-out/**,.agents/**,**/*.md,**/*.rst"

[functions]
  directory = "netlify/functions"

[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    # X-XSS-Protection removed: legacy header, deprecated, ignored by
    # modern browsers, and can actively conflict with a strong CSP.
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Cross-Origin-Opener-Policy = "same-origin"
    Cross-Origin-Resource-Policy = "same-origin"
    # CSP — audit §H-2 hardened, with the two legitimate vendor CDNs
    # restored after the analytics tab broke when Chart.js + jsPDF +
    # JSZip + EmailJS could not load.
    #
    # Restored:
    #  - https://cdn.jsdelivr.net (Chart.js, JSZip, EmailJS) — pinned
    #    versions used by index.html. Future hardening: bundle these
    #    into assets/vendor/ and drop the CDN entirely. SRI integrity
    #    hashes should be added to the script tags as a follow-up.
    #  - https://cdnjs.cloudflare.com (jsPDF) — same rationale.
    #
    # Still removed (the worst offenders from audit §H-2):
    #  - 'unsafe-hashes' — wide XSS surface
    #  - https://api.allorigins.win (public CORS proxy, exfiltration vector)
    #  - https://*.netlify.app wildcard from connect-src
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'sha256-rfKDPA19kipyTuEwSC0NbrQ1AgOvF9ApBGMeVDlTLls=' 'sha256-dCmTh5g4qHzNrdfIR9qFg3IQkXDbF/PtiQuhOmNl2pw=' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' https://app.asana.com https://api.anthropic.com https://api.openai.com https://www.googleapis.com https://accounts.google.com https://generativelanguage.googleapis.com https://api.tavily.com https://api.metals.live https://api.gold-api.com https://api.metalpriceapi.com https://open.er-api.com https://data-asg.goldprice.org https://fonts.googleapis.com https://fonts.gstatic.com https://openrouter.ai https://scsanctions.un.org https://sanctionslistservice.ofac.treas.gov https://webgate.ec.europa.eu https://ofsistorage.blob.core.windows.net; base-uri 'self'; form-action 'self'; object-src 'none'; frame-ancestors 'none'; upgrade-insecure-requests"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Content-Type = "application/javascript"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Content-Type = "application/manifest+json"

# CORS for all API endpoints — ensures browser-based calls from the
# SPA (index.html, setup.html) can reach every Netlify function.
# Individual functions that set their own Access-Control-Allow-Origin
# will override this default (Netlify: function headers > toml headers).
[[headers]]
  for = "/api/*"
  [headers.values]
    Access-Control-Allow-Origin = "https://hawkeye-sterling-v2.netlify.app"
    Access-Control-Allow-Methods = "GET, POST, OPTIONS"
    Access-Control-Allow-Headers = "Authorization, Content-Type"
    Access-Control-Max-Age = "600"
    Vary = "Origin"

[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin = "https://hawkeye-sterling-v2.netlify.app"
    Access-Control-Allow-Methods = "GET, POST, OPTIONS"
    Access-Control-Allow-Headers = "Authorization, Content-Type"
    Access-Control-Max-Age = "600"
    Vary = "Origin"
